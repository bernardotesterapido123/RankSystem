name: Build Plugin

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build com Maven
        run: mvn -B clean package

      - name: Upload do JAR
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: target/*.jar
